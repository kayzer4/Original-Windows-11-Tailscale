name: Pure macOS VNC via Tailscale

on:
  workflow_dispatch:

jobs:
  vnc-session:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install and start TigerVNC
        shell: bash
        run: |
          # Устанавливаем TigerVNC через Homebrew (убедимся, что это формула, а не cask)
          brew install tigervnc --formula

          # Задаём пароль VNC
          VNC_PASS="vncpassword"
          mkdir -p ~/.vnc
          echo "$VNC_PASS" | /opt/homebrew/bin/vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          # Запускаем VNC-сервер на дисплее :1, привязываемся ко всем интерфейсам
          /opt/homebrew/bin/vncserver :1 -geometry 1280x720 -depth 24 -localhost no

          echo "VNC_PASS=$VNC_PASS" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          hostname: github-runner-${{ github.run_id }}

      - name: Get Tailscale IP
        shell: bash
        run: |
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Display Connection Details and Keep Alive
        shell: bash
        run: |
          echo "================================================"
          echo "✅ MACOS VNC IS READY!"
          echo "================================================"
          echo "IP Address : ${{ env.TAILSCALE_IP }}"
          echo "Password   : ${{ env.VNC_PASS }}"
          echo "================================================"
          echo "To connect, use a VNC client and enter the IP above."
          echo "If using Screen Sharing on Mac: vnc://${{ env.TAILSCALE_IP }}"
          echo "Password: ${{ env.VNC_PASS }}"

          # Keep session alive
          while true; do
            echo "✓ Active - $(date)"
            sleep 300
          done
