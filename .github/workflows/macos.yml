name: Pure macOS VNC via Tailscale

on:
  workflow_dispatch:

jobs:
  vnc-session:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Enable built-in VNC (Screen Sharing)
        shell: bash
        run: |
          # Включаем удалённое управление (ARD)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all \
            -allowAccessFor -allUsers

          # Устанавливаем пароль VNC для пользователя runneradmin
          VNC_PASS="vncpassword"
          sudo dscl . -passwd /Users/runneradmin $VNC_PASS

          # Сохраняем пароль в переменную окружения
          echo "VNC_PASS=$VNC_PASS" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          hostname: github-runner-${{ github.run_id }}

      - name: Get Tailscale IP
        shell: bash
        run: |
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Display Connection Details and Keep Alive
        shell: bash
        run: |
          echo "================================================"
          echo "✅ MACOS VNC IS READY!"
          echo "================================================"
          echo "IP Address : ${{ env.TAILSCALE_IP }}"
          echo "Password   : ${{ env.VNC_PASS }}"
          echo "================================================"
          echo "To connect, use a VNC client (e.g., Screen Sharing on Mac)."
          echo "In the client, enter the IP address above."
          echo ""
          echo "The password is: ${{ env.VNC_PASS }}"

          # Keep session alive
          while true; do
            echo "✓ Active - $(date)"
            sleep 300
          done
