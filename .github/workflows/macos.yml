name: Pure macOS VNC via Tailscale

on:
  workflow_dispatch:

jobs:
  vnc-session:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Create VNC user and enable Screen Sharing
        shell: bash
        run: |
          # Создаём пользователя vncuser с паролем vncpassword (он будет администратором)
          sudo sysadminctl -addUser vncuser -password vncpassword -admin

          # Включаем удалённое управление (ARD) и разрешаем доступ для всех пользователей
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all \
            -allowAccessFor -allUsers

          # Сохраняем пароль в переменную окружения
          echo "VNC_PASS=vncpassword" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          hostname: github-runner-${{ github.run_id }}

      - name: Get Tailscale IP
        shell: bash
        run: |
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Display Connection Details and Keep Alive
        shell: bash
        run: |
          echo "================================================"
          echo "✅ MACOS VNC IS READY!"
          echo "================================================"
          echo "IP Address : ${{ env.TAILSCALE_IP }}"
          echo "Username   : vncuser"
          echo "Password   : ${{ env.VNC_PASS }}"
          echo "================================================"
          echo "To connect, open Screen Sharing (macOS) or any VNC client."
          echo "On Mac: Cmd+K -> vnc://${{ env.TAILSCALE_IP }}"
          echo "Enter the username and password above."

          # Keep session alive
          while true; do
            echo "✓ Active - $(date)"
            sleep 300
          done
