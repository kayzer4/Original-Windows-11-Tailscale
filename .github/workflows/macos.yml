name: Pure macOS AnyDesk via Tailscale

on:
  workflow_dispatch:

jobs:
  anydesk-session:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install AnyDesk
        shell: bash
        run: |
          # Скачиваем AnyDesk для Mac
          curl -L -o AnyDesk.dmg "https://download.anydesk.com/AnyDesk.dmg"
          sudo hdiutil attach AnyDesk.dmg
          sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
          sudo hdiutil detach /Volumes/AnyDesk

      - name: Start AnyDesk and get credentials
        shell: bash
        run: |
          # Запускаем AnyDesk в фоне
          /Applications/AnyDesk.app/Contents/MacOS/AnyDesk &

          # Ждём, пока сервис запустится
          sleep 5

          # Получаем ID и пароль через CLI
          # AnyDesk имеет клиентскую программу для получения пароля
          # Но у нас нет пароля доступа, поэтому используем статический пароль
          # Устанавливаем пароль через файл конфигурации
          mkdir -p ~/.anydesk
          echo "ad.password=anydesk123" > ~/.anydesk/anydesk.conf

          # Перезапускаем AnyDesk для применения конфига
          killall AnyDesk || true
          /Applications/AnyDesk.app/Contents/MacOS/AnyDesk &

          sleep 5

          # Получаем ID AnyDesk
          ID=$(/Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
          echo "ANYDESK_ID=$ID" >> $GITHUB_ENV
          echo "ANYDESK_PASS=anydesk123" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          hostname: github-runner-${{ github.run_id }}

      - name: Get Tailscale IP
        shell: bash
        run: |
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Display Connection Details and Keep Alive
        shell: bash
        run: |
          echo "================================================"
          echo "✅ MACOS ANYDESK IS READY!"
          echo "================================================"
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          echo "AnyDesk ID  : ${{ env.ANYDESK_ID }}"
          echo "Password    : ${{ env.ANYDESK_PASS }}"
          echo "================================================"
          echo "Connect via AnyDesk client using the ID and password."
          echo "You can also use Tailscale IP for direct connection if AnyDesk supports it."

          while true; do
            echo "✓ Active - $(date)"
            sleep 300
          done
