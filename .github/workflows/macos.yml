name: Pure macOS VNC via Tailscale

on:
  workflow_dispatch:

jobs:
  vnc-session:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install TigerVNC (cask)
        shell: bash
        run: |
          brew install --cask tigervnc

      - name: Setup VNC password and start server
        shell: bash
        run: |
          VNC_PASS="vncpassword"
          # Путь к исполняемым файлам внутри .app
          VNC_BIN="/Applications/TigerVNC.app/Contents/MacOS"
          mkdir -p ~/.vnc
          echo "$VNC_PASS" | "$VNC_BIN/vncpasswd" -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          # Запускаем сервер
          "$VNC_BIN/vncserver" :1 -geometry 1280x720 -depth 24 -localhost no
          echo "VNC_PASS=$VNC_PASS" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          hostname: github-runner-${{ github.run_id }}

      - name: Get Tailscale IP
        shell: bash
        run: |
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Display Connection Details and Keep Alive
        shell: bash
        run: |
          echo "================================================"
          echo "✅ MACOS VNC IS READY!"
          echo "================================================"
          echo "IP Address : ${{ env.TAILSCALE_IP }}"
          echo "Password   : ${{ env.VNC_PASS }}"
          echo "================================================"
          echo "Connect via: vnc://${{ env.TAILSCALE_IP }}"
          echo "Password: ${{ env.VNC_PASS }}"
          while true; do
            echo "✓ Active - $(date)"
            sleep 300
          done
