name: Pure macOS VNC via Tailscale

on:
  workflow_dispatch:

jobs:
  vnc-session:
    runs-on: macos-latest              # <-- меняем на macOS
    timeout-minutes: 360

    steps:
      - name: Install and Start VNC Server
        shell: bash
        run: |
          # Устанавливаем TigerVNC через Homebrew
          brew install tigervnc

          # Создаём папку для паролей
          mkdir -p ~/.vnc

          # Устанавливаем пароль VNC (можно изменить, но он будет виден в логах)
          VNC_PASS="vncpassword"
          echo "$VNC_PASS" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          # Запускаем VNC-сервер на дисплее :1
          vncserver :1 -geometry 1280x720 -depth 24 -localhost no

          echo "VNC_PASS=$VNC_PASS" >> $GITHUB_ENV
          echo "VNC_DISPLAY=:1" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}   # используем ваш существующий секрет
          hostname: github-runner-${{ github.run_id }}

      - name: Get Tailscale IP
        shell: bash
        run: |
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Display Connection Details and Keep Alive
        shell: bash
        run: |
          echo "================================================"
          echo "✅ MACOS VNC IS READY!"
          echo "================================================"
          echo "IP Address : ${{ env.TAILSCALE_IP }}"
          echo "Display    : ${{ env.VNC_DISPLAY }}"
          echo "Password   : ${{ env.VNC_PASS }}"
          echo "================================================"
          echo "To connect, use a VNC client (e.g., Screen Sharing on Mac)."
          echo "In the client, enter: ${{ env.TAILSCALE_IP }}:${{ env.VNC_DISPLAY }}"
          echo ""
          echo "The password is: ${{ env.VNC_PASS }}"

          # Keep session alive
          while true; do
            echo "✓ Active - $(date)"
            sleep 300
          done
